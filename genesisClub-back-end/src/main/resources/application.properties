spring.application.name=genesisClub
server.port=8080

spring.profiles.active=dev
# Configuración General
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (Rutas relativas a la raíz del proyecto)
jwt.private-key-path=jwtKeys/private_key.pem
jwt.public-key-path=jwtKeys/public_key.pem
jwt.expiration-time=900000

# Frontend URL
app.front.url=https://genesisclub-frontend.onrender.com

# 🚀 SOLUCIÓN AL 401 EN RENDER:
# 1. Permite sobreescribir configuraciones si es necesario
spring.main.allow-bean-definition-overriding=true
# 2. Apaga el generador de contraseñas por defecto de Spring Boot
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
