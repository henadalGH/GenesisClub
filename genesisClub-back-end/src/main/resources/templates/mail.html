<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Correo de Prueba</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hola, usuario!</h1>
        <p>Has recibido un nuevo mensaje desde <strong>GenesisClub</strong>:</p>
        <hr>
        <p th:text="${mensaje}"></p>
        <hr>
        <small>Este es un correo automático, por favor no lo respondas.</small>
    </div>
</body>
</html>
