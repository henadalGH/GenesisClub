<header class="admin-header">

  <div class="logo">
    <h2>Panel Admin</h2>
  </div>

  <!-- ☰ Hamburguesa (solo mobile) -->
  <button class="menu-toggle" (click)="toggleMenu()">
    ☰
  </button>

  <nav class="nav-buttons" [class.open]="menuAbierto">

    <button class="nav-btn" [routerLink]="['/solicitudesPendientes']" (click)="cerrarMenu()">
      Solicitudes
    </button>

    <button class="nav-btn" (click)="cerrarMenu()">
      Invitaciones
    </button>

    <button class="nav-btn" [routerLink]="['/listaSocios']" (click)="cerrarMenu()">
      Socios
    </button>

    <button class="nav-btn" [routerLink]="['/listaRubros']">Rubros</button>

    <!-- logout mobile -->
    <button class="logout mobile-only" (click)="logout()">
      Cerrar sesión
    </button>

  </nav>

  <!-- logout desktop -->
  <div class="acciones desktop-only">
    <button class="logout" (click)="logout()">
      Cerrar sesión
    </button>
  </div>

</header>
