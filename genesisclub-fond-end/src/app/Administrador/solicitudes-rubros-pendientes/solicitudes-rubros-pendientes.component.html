<div class="container">
  <h2>Solicitudes de Rubros Pendientes</h2>
  <div *ngIf="loading" class="loading">Cargando...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
  <table *ngIf="!loading">
    <thead>
      <tr>
        <th>ID</th>
        <th>Socio</th>
        <th>Rubro</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let solicitud of solicitudes">
        <td>{{ solicitud.id }}</td>
        <td>{{ solicitud.socio?.usuario?.nombre || 'N/A' }}</td>
        <td>{{ solicitud.rubro?.nombre || 'N/A' }}</td>
        <td>{{ solicitud.fechaCreacion | date:'short' }}</td>
        <td>
          <button (click)="aprobar(solicitud.id)">Aprobar</button>
          <button (click)="rechazar(solicitud.id)">Rechazar</button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="!loading && solicitudes.length === 0" class="no-data">No hay solicitudes pendientes.</div>
</div>
