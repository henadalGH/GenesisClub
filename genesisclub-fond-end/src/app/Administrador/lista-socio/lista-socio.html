<app-header-admin></app-header-admin>

<section class="socios-container">

  <div class="top-bar">
    <div class="titulo-seccion">
      <h1>👥 Gestión de socios</h1>
      <p class="subtitulo">Visualiza y administra la lista completa de socios activos</p>
    </div>
    <button class="btn-primary">+ Nuevo socio</button>
  </div>

  <div class="tabla-wrapper">

    <table class="tabla-socios">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Email</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>
        @for (soc of socios; track soc.id) {
          <tr>
            <td class="col-id">{{ $index + 1 }}</td>
            <td class="font-bold">{{ soc.nombre }}</td>
            <td>{{ soc.apellido }}</td>
            <td class="text-muted">{{ soc.email }}</td>
            <td class="acciones-celda">
              <button class="btn-icon btn-view" title="Ver detalle" (click)="verSocio(soc.id)">
                👁️ Ver
              </button>
              <button class="btn-icon btn-edit" title="Editar socio">
                ✏️ Editar
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="tabla-vacia">
              <div class="vacio-content">
                <p>No se encontraron socios registrados en el sistema.</p>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>

  </div>

</section>
