<header class="jh-header">
  <div class="jh-container">
    
    <div class="jh-logo" >
      <div class="jh-logo__box">G</div>
      <div class="jh-logo__text">
        <h2>Genesis<span>Club</span></h2>
        <span class="jh-badge">Jugador</span>
      </div>
    </div>

    <nav class="jh-nav">
      <a class="jh-nav__link" >
        <i class="bi bi-house-door"></i>
        <span>Inicio</span>
      </a>
      
      <a class="jh-nav__link" routerLinkActive="active">
        <i class="bi bi-trophy"></i>
        <span>Rubros</span>
      </a>

      <a class="jh-nav__link">
        <i class="bi bi-person-badge"></i>
        <span>Perfil</span>
      </a>
    </nav>

    <div class="jh-actions">
      <button class="jh-btn-exit" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        <span>Cerrar Sesión</span>
      </button>
    </div>

  </div>
</header>
