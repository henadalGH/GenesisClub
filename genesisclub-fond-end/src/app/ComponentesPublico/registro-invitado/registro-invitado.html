<div class="ri-wrapper">

  <div class="ri-card">

    <!-- HEADER -->
    <div class="ri-header">
      <span class="ri-badge">✉️ Invitación</span>
      <h2 class="ri-titulo">Registro por invitación</h2>
      <p class="ri-subtitulo">Completá tus datos para crear tu cuenta en GenesisClub</p>
    </div>

    <form (ngSubmit)="registrar()" #form="ngForm" class="ri-form">

      <!-- Nombre y Apellido -->
      <div class="ri-grid">
        <div class="ri-field">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="datos.nombre" name="nombre" required placeholder="Juan">
        </div>
        <div class="ri-field">
          <label>Apellido</label>
          <input type="text" [(ngModel)]="datos.apellido" name="apellido" required placeholder="Pérez">
        </div>
      </div>

      <!-- Contacto -->
      <div class="ri-field">
        <label class="ri-label-main">Número de Contactosdfgdf</label>
        <div class="ri-telefono">
          <div class="ri-telefono__cod">
            <label>Cód. área</label>
            <input type="text" [(ngModel)]="datos.codigoArea" name="codigoArea" placeholder="351">
          </div>
          <div class="ri-telefono__num">
            <label>Celular</label>
            <input type="text" [(ngModel)]="datos.numeroCel" name="numeroCelular" placeholder="612345678">
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="ri-field">
        <label>Email</label>
        <input type="email" [(ngModel)]="datos.email" name="email" required placeholder="correo@email.com">
      </div>

      <!-- Vehículo -->
      <div class="ri-field">
        <label class="ri-label-main">
          Vehículo
        </label>
        <div class="ri-grid">
          <div class="ri-field">
            <label>Patente</label>
            <input type="text" [(ngModel)]="datos.patente" name="patente" placeholder="ABC123">
          </div>
          <div class="ri-field">
            <label>Marca</label>
            <input type="text" [(ngModel)]="datos.marca" name="marca" placeholder="Ford, Toyota...">
          </div>
          <div class="ri-field">
            <label>Modelo</label>
            <input type="text" [(ngModel)]="datos.modelo" name="modelo" placeholder="Fiesta, Corolla...">
          </div>
          <div class="ri-field">
            <label>Año</label>
            <input type="number" [(ngModel)]="datos.anio" name="anio" placeholder="2020">
          </div>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="ri-field">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="datos.password" name="password" required placeholder="Ingresá tu contraseña">
      </div>

      <!-- Submit -->
      <button type="submit" class="ri-btn" [disabled]="cargando || form.invalid">
        @if (cargando) {
          <span class="ri-spinner"></span> Registrando...
        } @else {
          Registrarme
        }
      </button>

    </form>

  </div>

</div>
