<div class="contenedor">

  <div class="card">
    
    <div class="header-card">
      <h2 class="titulo">Solicitud de Registro - Jugador</h2>
      <p class="descripcion">
        Completá tus datos y la información del vehículo (si corresponde). Nuestro equipo revisará tu solicitud a la brevedad.
      </p>
    </div>

    <form class="formulario" (ngSubmit)="enviarSolicitud()" #solicitudForm="ngForm">

      <div class="grid-campos">
        <div class="campos">
          <label>Nombre</label>
          <input type="text" placeholder="Ej: Juan" required name="nombre" [(ngModel)]="nombre">
        </div>

        <div class="campos">
          <label>Apellido</label>
          <input type="text" placeholder="Ej: Pérez" required name="apellido" [(ngModel)]="apellido">
        </div>
      </div>

      <div class="campos">
        <label>Correo electrónico</label>
        <input type="email" placeholder="ejemplo@email.com" required name="email" [(ngModel)]="email">
      </div>

      <div class="campos">
        <label>Número de Contacto</label>
        <input type="text" placeholder="WhatsApp o teléfono fijo" required name="contacto" [(ngModel)]="contacto">
      </div>

      <!-- datos de vehículo -->
      <div class="grid-campos">
        <div class="campos">
          <label>Patente</label>
          <input type="text" placeholder="ABC123" name="patente" [(ngModel)]="patente">
        </div>
        <div class="campos">
          <label>Marca</label>
          <input type="text" placeholder="Ford, Toyota..." name="marca" [(ngModel)]="marca">
        </div>
      </div>
      <div class="grid-campos">
        <div class="campos">
          <label>Modelo</label>
          <input type="text" placeholder="Fiesta, Corolla..." name="modelo" [(ngModel)]="modelo">
        </div>
        <div class="campos">
          <label>Año</label>
          <input type="number" name="anio" [(ngModel)]="anio">
        </div>
      </div>
      <div class="campos">
        <label><input type="checkbox" [(ngModel)]="tieneGnc" name="tieneGnc"> Tiene GNC</label>
      </div>

      <div class="grid-campos">
        <div class="campos">
          <label>Contraseña</label>
          <input type="password" placeholder="Creá una clave" required name="password" [(ngModel)]="password">
        </div>

        <div class="campos">
          <label>Confirmar contraseña</label>
          <input type="password" placeholder="Repetí tu clave" required name="confirmPassword" [(ngModel)]="confirmPassword">
        </div>
      </div>

      <div class="botones">
        <button type="submit" class="btn-enviar" [disabled]="cargando || !solicitudForm.valid">
          @if (cargando) {
            <span class="spinner"></span> Procesando...
          } @else {
            Enviar Solicitud
          }
        </button>
        
        <button type="button" class="btn-cancelar" [routerLink]="['/inicio']">
          Cancelar
        </button>
      </div>

    </form>

  </div>

</div>
