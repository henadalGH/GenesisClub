
<app-herader-socio></app-herader-socio>

<section class="inicio-container">

  <div class="bienvenida">
    <h1>Bienvenido 👋</h1>
    <p>Gestioná tu club desde el panel de control</p>
  </div>

  <div class="cards">

    <div class="card">
      <h3>👥 Socios</h3>
      <p>Administrá tus socios registrados</p>
      <button routerLink="/socio/socios">Ver socios</button>
    </div>

    <div class="card">
      <h3>✉ Invitaciones</h3>
      <p>Invitá nuevos socios por email</p>
      <button routerLink="/invitaciones">Enviar invitación</button>
    </div>

    <div class="card">
      <h3>💼 Rubros</h3>
      <p>Organizá tus categorías</p>
      <button routerLink="/socio/rubros">Gestionar</button>
    </div>

    <div class="card">
      <h3>📊 Estadísticas</h3>
      <p>Visualizá métricas del club</p>
      <button routerLink="/socio/estadisticas">Ver reportes</button>
    </div>

  </div>

</section>
