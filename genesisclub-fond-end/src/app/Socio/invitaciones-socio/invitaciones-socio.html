<div class="contenedor">
  <form class="card-invitacion" (ngSubmit)="enviarInvitacion()">

    <h2>Enviar invitación</h2>
    <p class="subtitulo">Invitá un nuevo socio por correo electrónico</p>

    <div class="campo">
      <label>Email del invitado</label>
      <input 
        type="email" 
        placeholder="ejemplo@mail.com"
      />
    </div>

    <button type="submit">
      Enviar invitación
    </button>

  </form>
</div>
