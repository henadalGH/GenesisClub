    <header class="admin-header">

        <div class="logo">
            <h2>GenesisClub</h2>
            <span class="panel-label">Panel Socio</span>
        </div>


        <nav class="nav-buttons">

            <button type="button" [routerLink]="['/socio/inicio']">
                🏠 Inicio
            </button>

            <button type="button" (click)="abrirModal()">
                ✉️ Invitar socio
            </button>

            <button type="button" [routerLink]="['/mis-rubros']">
                👥 Mis socios
            </button>

            <!-- Rubros asociados -->
            <button type="button" class="rubros-btn" [routerLink]="['/socio/rubros']">
                💼 Mis rubros 
                <span class="tooltip">Asociarte a rubros con clave de acceso</span>
            </button>

            <button type="button" [routerLink]="['/socio/mis-rubros-asociados']">
                ⭐ Rubros asociados
            </button>

            <button type="button" routerLink="/socio/estadisticas">
                📊 Estadísticas
            </button>

        </nav>


        <div class="acciones">

            <button type="button" class="perfil" routerLink="/socio/perfil">
                👤 Mi perfil
            </button>

            <button type="button" class="logout" (click)="logout()">
                🚪 Cerrar sesión
            </button>

        </div>

    </header>

    @if (modalAbierto) {
    <div class="overlay" (click)="cerrarModal()">

        <div class="modal" (click)="$event.stopPropagation()">

        <span class="cerrar" (click)="cerrarModal()">✕</span>

        <h2>Enviar invitación</h2>
        <p class="subtitulo">Ingresá el email del invitado</p>

        <form (ngSubmit)="enviarInvitacion()">
            
            <input 
            type="email" 
            name="emailInvitado"
            placeholder="correo@mail.com" 
            [(ngModel)]="emailInvitado"
            required
            [disabled]="cargando"
            />

            <button type="submit" [disabled]="!emailInvitado || cargando">
            {{ cargando ? 'Enviando...' : 'Enviar invitación' }}
            </button>

            <button type="button" class="cancelar" (click)="cerrarModal()" [disabled]="cargando">
            Cancelar
            </button>
        </form>

        </div>
    </div>
    }
