<header class="admin-header">
  <div class="header-container">
    
    <div class="logo" [routerLink]="['/inicioSocio']">
      <div class="logo-icon">G</div>
      <div class="logo-text">
        <h2>Genesis<span>Club</span></h2>
        <span class="panel-label">Portal Socio</span>
      </div>
    </div>

    <nav class="nav-horizontal">
      <a class="nav-link" [routerLink]="['/inicioSocio']" routerLinkActive="active">
        <i class="bi bi-house-door"></i> Inicio
      </a>
      
      <a class="nav-link" [routerLink]="['/misSocios']" routerLinkActive="active">
        <i class="bi bi-people"></i> Mi Red
      </a>

      <div class="dropdown">
        <button class="nav-link dropdown-btn">
          <i class="bi bi-briefcase"></i> Rubros <i class="bi bi-chevron-down arrow"></i>
        </button>
        <div class="dropdown-content">
          <a [routerLink]="['/misRubros']">⭐ Mis Rubros</a>
          <a [routerLink]="['/rubrosDisponibles']">🔍 Explorar Rubros</a>
        </div>
      </div>
    </nav>

    <div class="acciones">
      <button class="btn-invitar" (click)="abrirModal()">
        <i class="bi bi-plus-lg"></i> Invitar
      </button>

      <div class="user-menu">
        <button class="perfil-btn" [routerLink]="['/socio/perfil']">
          <div class="user-avatar">👤</div>
          <span>Mi Perfil</span>
        </button>
        <button class="logout-btn" (click)="logout()" title="Cerrar Sesión">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

  </div>
</header>

@if (modalAbierto) {
<div class="overlay" (click)="cerrarModal()" [@fadeIn]>
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close-x" (click)="cerrarModal()">✕</button>
    
    <div class="modal-header">
      <div class="icon-circle">
        <i class="bi bi-envelope-paper-heart"></i>
      </div>
      <h2>Expandí tu Red</h2>
      <p>Enviá una invitación directa a un nuevo socio</p>
    </div>

    <form (ngSubmit)="enviarInvitacion()" class="modal-form">
      <div class="input-group">
        <label>Correo electrónico</label>
        <input 
          type="email" 
          name="emailInvitado"
          placeholder="ejemplo@genesis.com" 
          [(ngModel)]="emailInvitado"
          required
          [disabled]="cargando"
        />
      </div>

      <div class="modal-actions">
        <button type="submit" class="btn-submit" [disabled]="!emailInvitado || cargando">
          {{ cargando ? 'Enviando...' : 'Enviar Invitación' }}
        </button>
        <button type="button" class="btn-cancel" (click)="cerrarModal()" [disabled]="cargando">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
}
